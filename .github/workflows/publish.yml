name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm 11.13.0 to user prefix (required for OIDC publish)
        # Self-upgrading the bundled npm in place ("npm install -g npm@latest")
        # crashes mid-install with "Cannot find module 'promise-retry'" because
        # npm overwrites its own files while running. Install to a separate
        # user-owned prefix and prepend it to PATH instead.
        run: |
          mkdir -p "$HOME/.npm-global"
          npm install --prefix "$HOME/.npm-global" npm@11.13.0
          echo "$HOME/.npm-global/node_modules/.bin" >> $GITHUB_PATH

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Update version from release tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public
